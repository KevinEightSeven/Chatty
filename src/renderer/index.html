<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://api.betterttv.net https://api.frankerfacez.com https://7tv.io https://api.github.com; img-src 'self' https://static-cdn.jtvnw.net https://cdn.betterttv.net https://cdn.frankerfacez.com https://cdn.7tv.app https://*.twitch.tv data:; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Chatty</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Custom titlebar -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <span id="titlebar-title">Chatty</span>
    </div>
    <div id="titlebar-account">
      <img id="account-avatar" src="" alt="" style="display:none;">
      <span id="account-name">Not logged in</span>
      <button id="btn-account" title="Account">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button id="btn-alerts" title="Alerts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button id="btn-settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
    <div id="titlebar-controls">
      <button id="btn-minimize" title="Minimize">&#x2500;</button>
      <button id="btn-maximize" title="Maximize">&#x25A1;</button>
      <button id="btn-close" title="Close">&#x2715;</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <div id="tabs-container"></div>
    <button id="btn-add-tab" title="Add Tab">+</button>
  </div>

  <!-- Main content area -->
  <div id="main-content">
    <div id="split-container"></div>
  </div>

  <!-- Account / Settings Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title">Account</h2>
        <button id="modal-close">&#x2715;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Stream search dialog -->
  <div id="search-overlay" class="hidden">
    <div id="search-dialog">
      <div id="search-header">
        <h3>Add Chat</h3>
        <button id="search-close">&#x2715;</button>
      </div>
      <div id="search-tabs">
        <button class="search-tab active" data-tab="browse">Browse Streams</button>
        <button class="search-tab" data-tab="categories">Categories</button>
        <button class="search-tab" data-tab="channel">Channel Name</button>
      </div>
      <div id="search-body">
        <div id="search-browse" class="search-panel active">
          <input type="text" id="search-input" placeholder="Search Twitch live streams...">
          <div id="search-results"></div>
        </div>
        <div id="search-categories" class="search-panel">
          <p class="search-hint">Browse top categories:</p>
          <div id="categories-results"></div>
        </div>
        <div id="search-channel" class="search-panel">
          <input type="text" id="channel-input" placeholder="Search for a channel...">
          <div id="channel-search-results"></div>
        </div>
      </div>
      <div id="search-target" style="display:none;" data-split-id=""></div>
    </div>
  </div>

  <script src="components/emote-badge-manager.js"></script>
  <script src="components/tab-manager.js"></script>
  <script src="components/split-manager.js"></script>
  <script src="components/chat-view.js"></script>
  <script src="components/modals.js"></script>
  <script src="app.js"></script>
</body>
</html>
